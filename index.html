<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Paper Reader</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="library-panel" aria-label="논문 라이브러리">
        <div class="library-head">
          <div>
            <h2>Library</h2>
            <p id="libraryStats">폴더를 열어 인덱싱하세요.</p>
          </div>
          <button id="scanFolderButton" type="button">폴더 열기</button>
        </div>
        <div class="library-search-row">
          <input id="librarySearchInput" type="search" placeholder="제목, 태그, arXiv 검색" />
          <button id="rescanFolderButton" type="button" title="최근 폴더 다시 스캔">↻</button>
        </div>
        <div class="library-filter-row">
          <select id="librarySortSelect" aria-label="논문 정렬">
            <option value="recent">최근 열람순</option>
            <option value="published-desc">최근 출판순</option>
            <option value="published-asc">오래된 출판순</option>
            <option value="added-desc">최근 추가순</option>
            <option value="title">제목순</option>
          </select>
          <select id="publicationPeriodSelect" aria-label="출판 기간 필터">
            <option value="all">전체 기간</option>
            <option value="1y">최근 1년</option>
            <option value="3y">최근 3년</option>
            <option value="5y">최근 5년</option>
            <option value="unknown">출판일 미확인</option>
          </select>
        </div>
        <div id="libraryProgress" class="library-progress" hidden>
          <div class="library-progress-main">
            <div class="library-progress-track">
              <div id="libraryProgressBar" class="library-progress-bar"></div>
            </div>
            <button id="workQueueButton" type="button">작업</button>
          </div>
          <span id="libraryProgressText">준비 중</span>
          <div id="workQueuePanel" class="work-queue-panel" hidden>
            <strong>작업 현황</strong>
            <div id="workQueueList" class="work-queue-list"></div>
          </div>
        </div>
        <div id="tagFilterList" class="tag-filter-list" aria-label="태그 필터"></div>
        <div id="paperList" class="paper-list" aria-live="polite"></div>
      </aside>
      <section class="reader">
        <header class="toolbar" aria-label="PDF 보기 도구">
          <div class="toolbar-left">
            <div class="brand">
              <span class="brand-mark" aria-hidden="true">P</span>
              <div>
                <h1>Paper Reader</h1>
                <p>PDF 논문을 바로 열어 읽습니다.</p>
              </div>
            </div>
            <div class="toolbar-group file-actions">
              <button id="openButton" type="button">파일 열기</button>
              <button id="clearButton" type="button" disabled>닫기</button>
              <button id="historyButton" type="button">기록</button>
              <button id="graphButton" type="button">그래프</button>
              <button id="refsButton" type="button">Refs</button>
            </div>
          </div>

          <div class="toolbar-center">
            <button
              id="docInfoButton"
              class="doc-title-button"
              type="button"
              aria-expanded="false"
              aria-controls="docInfoPopover"
              disabled
            >
              <span id="docTitle" class="doc-title">문서 없음</span>
              <span class="doc-caret" aria-hidden="true"></span>
            </button>
            <div id="docInfoPopover" class="doc-info-popover" aria-live="polite">
              <dl>
                <div>
                  <dt>파일</dt>
                  <dd id="fileName">아직 열지 않음</dd>
                </div>
                <div>
                  <dt>크기</dt>
                  <dd id="fileSize">-</dd>
                </div>
                <div>
                  <dt>보기</dt>
                  <dd id="viewState">대기 중</dd>
                </div>
                <div>
                  <dt>페이지</dt>
                  <dd id="pageCount">-</dd>
                </div>
              </dl>
            </div>
          </div>

          <div class="toolbar-right">
            <div class="toolbar-group">
              <label for="zoomSelect">확대</label>
              <select id="zoomSelect" disabled>
                <option value="75">75%</option>
                <option value="100" selected>100%</option>
                <option value="125">125%</option>
                <option value="150">150%</option>
                <option value="200">200%</option>
                <option value="250">250%</option>
                <option value="300">300%</option>
                <option value="400">400%</option>
                <option value="500">500%</option>
              </select>
            </div>
            <div class="toolbar-group">
              <label for="pageInput">페이지</label>
              <input id="pageInput" type="number" min="1" value="1" disabled />
              <button id="goPageButton" type="button" disabled>이동</button>
            </div>
          </div>
        </header>
        <input id="fileInput" class="file-input" type="file" accept="application/pdf,.pdf" />

        <div class="viewer-frame" id="viewerFrame">
          <div class="empty-state" id="emptyState">
            <p class="eyebrow">PDF Viewer</p>
            <h2>논문 PDF를 선택하세요.</h2>
            <p>왼쪽에서 졸업 폴더를 인덱싱하거나 PDF를 직접 열 수 있습니다.</p>
            <label class="drop-zone" id="dropZone" for="fileInput">
              <span class="drop-icon" aria-hidden="true">PDF</span>
              <strong>PDF 선택</strong>
              <span>또는 여기에 끌어다 놓기</span>
            </label>
            <section id="recentFilesPanel" class="recent-files-panel" hidden>
              <h3>최근에 연 PDF</h3>
              <div id="recentFilesList" class="recent-files-list"></div>
            </section>
          </div>
          <div id="pdfPages" class="pdf-pages" aria-label="PDF 페이지"></div>
          <aside id="graphPanel" class="graph-panel" aria-live="polite" hidden>
            <div class="side-panel-head">
              <div>
                <strong>논문 관계 그래프</strong>
                <span>태그와 폴더 맥락 기반</span>
              </div>
              <button id="closeGraphButton" type="button" aria-label="그래프 닫기">×</button>
            </div>
            <div class="graph-controls">
              <label>
                보기
                <select id="graphViewSelect">
                  <option value="graph">3D 그래프</option>
                  <option value="list">리스트</option>
                  <option value="both">그래프 + 리스트</option>
                </select>
              </label>
              <label>
                지표
                <select id="graphMetricSelect">
                  <option value="importance">중요도</option>
                  <option value="connections">연결수</option>
                  <option value="references">Reference 후보</option>
                  <option value="summary">요약 상태</option>
                </select>
              </label>
            </div>
            <canvas id="paperGraph" class="paper-graph" role="img" aria-label="3D 논문 관계 그래프"></canvas>
            <div id="graphList" class="graph-list" hidden></div>
          </aside>
          <aside id="referencesPanel" class="references-panel" aria-live="polite" hidden>
            <div class="side-panel-head">
              <div>
                <strong>References</strong>
                <span id="referencesMeta">열린 논문 기준</span>
              </div>
              <button id="closeRefsButton" type="button" aria-label="참고문헌 닫기">×</button>
            </div>
            <div id="referencesList" class="references-list"></div>
          </aside>
          <aside id="translationPopover" class="translation-popover" aria-live="polite">
            <div class="popover-head">
              <span>로컬 LLM</span>
              <div class="popover-actions">
                <button class="assist-mode-button" type="button" data-assist-mode="translate">해석</button>
                <button class="assist-mode-button" type="button" data-assist-mode="explain">설명</button>
                <button class="assist-mode-button" type="button" data-assist-mode="related">관련</button>
                <label class="popover-font-control" for="popoverFontSizeSelect">
                  <span>글자</span>
                  <select id="popoverFontSizeSelect" aria-label="번역 메모 글자 크기">
                    <option value="12">12</option>
                    <option value="14">14</option>
                    <option value="16">16</option>
                    <option value="18">18</option>
                    <option value="20">20</option>
                  </select>
                </label>
                <button id="unpinPopoverButton" type="button">고정 해제</button>
                <button id="closePopoverButton" type="button" aria-label="번역창 닫기">×</button>
              </div>
            </div>
            <p id="popoverSelection" class="popover-selection"></p>
            <div id="popoverBody" class="popover-body">번역 중...</div>
          </aside>
          <aside id="historyPanel" class="history-panel" aria-live="polite" hidden>
            <div class="history-head">
              <div>
                <strong>검색 기록</strong>
                <span>파일별 단어와 문장</span>
              </div>
              <button id="closeHistoryButton" type="button" aria-label="기록 닫기">×</button>
            </div>
            <label class="history-file-picker">
              파일
              <select id="historyFileSelect"></select>
            </label>
            <div class="history-content">
              <section>
                <h3>단어</h3>
                <div id="wordHistoryList" class="history-list"></div>
              </section>
              <section>
                <h3>문장</h3>
                <div id="sentenceHistoryList" class="history-list"></div>
              </section>
            </div>
          </aside>
        </div>
      </section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
